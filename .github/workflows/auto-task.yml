name: Auto Crypto Scan

on:
  schedule:
    - cron: "5,15,25,35,45,55 * * * *"  # setiap 10 menit mulai dari menit ke-5
  workflow_dispatch:  # manual trigger

jobs:
  crypto-scan:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install axios

      # 4. Run scan script
      - name: Run Crypto Scan
        run: node index.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # 5. Commit updated data.json agar persist di repo
      - name: Commit updated data.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Update data.json"
          git push
